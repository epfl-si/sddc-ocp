- tags: always
  include_vars: resources.yml

- name: Set up OVN-Kubernetes default IPv4 range
  kubernetes.core.k8s:
    definition:
      apiVersion: operator.openshift.io/v1
      kind: Network
      metadata:
        name: cluster  # Not namespaced (and should already exist)
      spec:
        defaultNetwork:
          type: OVNKubernetes
          ovnKubernetesConfig:
            v4InternalSubnet: 172.31.0.0/16

- name: Rebuild CiliumConfig object
  tags: openshift.config.network.cilium
  when: >-
    "openshift.config.network.cilium" in ansible_run_tags
  kubernetes.core.k8s:
    definition: >-
      {{ lookup("template", "cluster-network-07-cilium-ciliumconfig.yaml",
                           template_vars=dict(networkConfig=resources_openshift_clusters[inventory_hostname])) }}
